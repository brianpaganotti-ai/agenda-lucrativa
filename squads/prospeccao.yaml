name: prospeccao
description: >
  Squad de prospecção de leads para o negócio Agenda Lucrativa.
  Busca potenciais clientes por cidade/segmento, normaliza os dados,
  filtra por critérios de qualificação e envia mensagem inicial via
  WhatsApp. Roda sem checkpoints — totalmente automatizado.

checkpoint: false   # executa do início ao fim sem pedir aprovação

schedule:
  cron: "0 8 * * 1-5"   # seg a sex, 08:00 horário da VM (America/Sao_Paulo)
  enabled: false         # habilitar após validar execução manual

# Variáveis injetadas no início de cada execução
variables:
  - name: CIDADE
    description: "Cidade-alvo da prospecção (ex: São Paulo, Curitiba)"
    default: "São Paulo"
  - name: SEGMENTO
    description: "Segmento de mercado (ex: academias, salões de beleza)"
    default: "salões de beleza"
  - name: LIMITE
    description: "Número máximo de leads por execução"
    default: "20"

# Pipeline de agentes — cada step é executado em sequência
pipeline:

  - id: buscador
    name: "Buscador de Leads"
    model: gemini-2.0-flash
    skill: serper-search          # skill que usa a Serper API
    prompt: >
      Pesquise por "{{SEGMENTO}} em {{CIDADE}}" usando a Serper API.
      Retorne uma lista JSON com até {{LIMITE}} negócios contendo:
      - nome, endereço, telefone, website, instagram (se disponível)
      Filtre apenas negócios com telefone válido.
      Salve o resultado em tmp/leads_brutos.json

  - id: qualificador
    name: "Qualificador de Leads"
    model: gemini-2.0-flash
    depends_on: [buscador]
    prompt: >
      Leia tmp/leads_brutos.json.
      Qualifique cada lead com base nos critérios:
      1. Tem telefone celular (começa com 9 após o DDD)?
      2. Tem presença online (website ou Instagram)?
      3. Parece ser negócio local (não é franquia grande)?
      Atribua score 0-10 para cada lead.
      Salve leads com score >= 6 em tmp/leads_qualificados.json
      Salve resumo em tmp/qualificacao_resumo.txt

  - id: redator
    name: "Redator de Mensagens"
    model: gemini-2.0-flash
    depends_on: [qualificador]
    prompt: >
      Leia tmp/leads_qualificados.json.
      Para cada lead, crie uma mensagem de WhatsApp personalizada:
      - Tom: profissional mas descontraído
      - Máximo 3 parágrafos curtos
      - Mencione o nome do negócio
      - Destaque 1 benefício específico para o segmento {{SEGMENTO}}
      - Inclua CTA claro para marcar uma conversa
      - NÃO use emojis em excesso (máximo 2 por mensagem)
      Salve em tmp/mensagens_whatsapp.json com formato:
      [{"lead": "nome", "telefone": "...", "mensagem": "..."}]

  - id: disparador
    name: "Disparador WhatsApp"
    model: gemini-2.0-flash
    depends_on: [redator]
    skill: whatsapp-send          # skill que chama a API Flask local
    prompt: >
      Leia tmp/mensagens_whatsapp.json.
      Para cada mensagem, chame o skill whatsapp-send com:
        telefone: <número E.164, ex: +5511999999999>
        mensagem: <texto da mensagem>
      Aguarde 3 segundos entre cada envio para evitar bloqueio.
      Registre sucessos e falhas.
      Salve relatório final em tmp/relatorio_prospeccao.json

  - id: notificador
    name: "Notificador Telegram"
    model: gemini-2.0-flash
    depends_on: [disparador]
    skill: telegram-notify        # skill que notifica o usuário
    prompt: >
      Leia tmp/relatorio_prospeccao.json e tmp/qualificacao_resumo.txt.
      Crie um resumo executivo da prospecção:
      - Quantos leads encontrados
      - Quantos qualificados
      - Quantas mensagens enviadas com sucesso
      - Quantas falharam
      Envie o resumo via skill telegram-notify.
